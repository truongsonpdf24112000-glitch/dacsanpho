<!-- PROVINCE PAGE -->
<div class="container"><nav class="breadcrumb"><a href="/">Trang chủ</a> › {{PROVINCE}}</nav></div>

<section class="hero province-hero">
  <div class="container">
    <h1>🍜 Món Ăn Đường Phố {{PROVINCE}}</h1>
    <p>Đặc sản địa phương chính gốc tại {{PROVINCE}} — tìm quán ngon đúng điệu</p>
    {{PROVINCE_STATS}}
  </div>
</section>

<!-- Dish Category Chips for this province -->
<div class="dish-chips-section">
  <div class="container">
    <div class="dish-chips">
      {{DISH_CHIPS}}
    </div>
  </div>
</div>

<div class="container">
  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>💰 Giá</label>
      <select id="filterPrice" onchange="applyFilters()" aria-label="Lọc theo giá">
        <option value="all">Tất cả giá</option>
        <option value="0">Dưới 50k</option>
        <option value="1">50k - 150k</option>
        <option value="2">Trên 150k</option>
      </select>
    </div>
    <div class="filter-group">
      <label>⭐ Rating</label>
      <select id="filterRating" onchange="applyFilters()" aria-label="Lọc theo đánh giá">
        <option value="all">Tất cả</option>
        <option value="4.5">4.5+</option>
        <option value="4">4.0+</option>
        <option value="3">3.0+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>📊 Sắp xếp</label>
      <select id="filterSort" onchange="applyFilters()" aria-label="Sắp xếp">
        <option value="default">Mặc định</option>
        <option value="rating-desc">⭐ Rating cao nhất</option>
        <option value="reviews-desc">💬 Nhiều đánh giá nhất</option>
        <option value="price-asc">💰 Giá thấp → cao</option>
        <option value="price-desc">💰 Giá cao → thấp</option>
      </select>
    </div>
    <button class="filter-chip" id="toggleOriginal" onclick="toggleOriginal()" aria-label="Lọc quán gốc">
      ⭐ Quán gốc
    </button>
    <button class="filter-chip" id="resetFilters" onclick="resetAllFilters()" style="background:#f5f5f5;" aria-label="Xóa bộ lọc">
      🔄 Xóa lọc
    </button>
    <span class="filter-result" id="resultCount">{{COUNT}} quán</span>
  </div>

  <div class="ad">📢 Quảng cáo</div>

  <section class="section">
    <div class="card-grid" id="vendorGrid">{{VENDOR_CARDS}}</div>
  </section>

  <div id="noResults" style="display:none;text-align:center;padding:40px;color:var(--text-muted);">
    <div style="font-size:3rem;margin-bottom:12px;">😕</div>
    <p style="font-size:1.1rem;">Không tìm thấy quán nào phù hợp</p>
    <button onclick="resetAllFilters()" style="margin-top:12px;padding:8px 20px;border:1.5px solid var(--primary);border-radius:var(--radius-full);background:var(--surface);color:var(--primary);cursor:pointer;font-weight:600;">Xóa bộ lọc</button>
  </div>

  <div class="ad">📢 Quảng cáo</div>

  {{NEARBY}}
</div>

<script>
(function() {
  const grid = document.getElementById('vendorGrid');
  let cards = Array.from(grid.querySelectorAll('.card'));
  let originalOrder = cards.map((c, i) => ({el: c, idx: i}));
  let activeCat = 'all';

  function getRating(el) { return parseFloat(el.dataset.rating) || 0; }
  function getReviews(el) { return parseInt(el.dataset.reviews) || 0; }
  function getPrice(el) { return parseInt(el.dataset.price); }
  function isOriginal(el) { return el.dataset.original === 'true'; }

  window.filterCatProv = function(cat) {
    activeCat = cat;
    document.querySelectorAll('.dish-chip').forEach(c => c.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
    applyFilters();
  };

  window.applyFilters = function() {
    const priceVal = document.getElementById('filterPrice').value;
    const ratingVal = document.getElementById('filterRating').value;
    const sortVal = document.getElementById('filterSort').value;
    const origOnly = document.getElementById('toggleOriginal').classList.contains('active-filter');

    let visible = cards.filter(c => {
      if (activeCat !== 'all' && c.dataset.category !== activeCat) return false;
      if (priceVal !== 'all') {
        const cp = getPrice(c);
        if (cp === -1) return true;
        if (cp !== parseInt(priceVal)) return false;
      }
      if (ratingVal !== 'all' && getRating(c) < parseFloat(ratingVal)) return false;
      if (origOnly && !isOriginal(c)) return false;
      return true;
    });

    // Sort
    if (sortVal === 'rating-desc') visible.sort((a,b) => getRating(b) - getRating(a));
    else if (sortVal === 'reviews-desc') visible.sort((a,b) => getReviews(b) - getReviews(a));
    else if (sortVal === 'price-asc') visible.sort((a,b) => (getPrice(a)===-1?999:getPrice(a)) - (getPrice(b)===-1?999:getPrice(b)));
    else if (sortVal === 'price-desc') visible.sort((a,b) => (getPrice(b)===-1?-1:getPrice(b)) - (getPrice(a)===-1?-1:getPrice(a)));
    else {
      visible.sort((a,b) => {
        const oa = originalOrder.find(o => o.el === a);
        const ob = originalOrder.find(o => o.el === b);
        return (oa ? oa.idx : 0) - (ob ? ob.idx : 0);
      });
    }

    // Update DOM
    grid.innerHTML = '';
    if (visible.length === 0) {
      document.getElementById('noResults').style.display = 'block';
      grid.style.display = 'none';
    } else {
      document.getElementById('noResults').style.display = 'none';
      grid.style.display = '';
      visible.forEach(c => grid.appendChild(c));
    }

    document.getElementById('resultCount').textContent = visible.length + ' quán';
  };

  window.toggleOriginal = function() {
    const btn = document.getElementById('toggleOriginal');
    btn.classList.toggle('active-filter');
    applyFilters();
  };

  window.resetAllFilters = function() {
    activeCat = 'all';
    document.getElementById('filterPrice').value = 'all';
    document.getElementById('filterRating').value = 'all';
    document.getElementById('filterSort').value = 'default';
    document.getElementById('toggleOriginal').classList.remove('active-filter');
    
    document.querySelectorAll('.dish-chip').forEach(c => c.classList.remove('active'));
    const firstChip = document.querySelector('.dish-chip');
    if (firstChip) firstChip.classList.add('active');
    
    applyFilters();
  };

  // Animation
  document.addEventListener('DOMContentLoaded', function() {
    cards = Array.from(grid.querySelectorAll('.card'));
    originalOrder = cards.map((c,i) => ({el: c, idx: i}));
    cards.forEach((card, i) => card.classList.add('animate-in'));
  });
})();
</script>
